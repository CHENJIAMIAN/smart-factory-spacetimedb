services:
  - type: web
    name: smart-factory-api
    runtime: node
    rootDir: render-backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CORS_ORIGIN
        value: "*"
      - key: MACHINE_ID
        value: "1"
